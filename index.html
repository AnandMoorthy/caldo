<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caldo - Minimalist Todo Calendar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="notification" id="notification" style="display:none"></div>
    
    <!-- Top Header with Import/Export -->
    <div class="top-header">
      <div class="header-left">
        <button class="nav prev" title="Previous Month">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 5a1 1 0 0 1 .7 1.7L5.9 10H18a1 1 0 1 1 0 2H5.9l3.3 3.3a1 1 0 1 1-1.4 1.4l-5-5a1 1 0 0 1 0-1.4l5-5A1 1 0 0 1 8.5 5z" fill="currentColor"/></svg>
        </button>
        <span class="month-label"></span>
        <button class="nav next" title="Next Month">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 19a1 1 0 0 1-.7-1.7L18.1 14H6a1 1 0 1 1 0-2h12.1l-3.3-3.3a1 1 0 1 1 1.4-1.4l5 5a1 1 0 0 1 0 1.4l-5 5a1 1 0 0 1-.7.3z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="header-right">
        <button class="export-json" title="Export Todos" aria-label="Export Todos">
          <svg viewBox="0 0 20 20" width="20" height="20" fill="none" style="opacity:0.7;"><path d="M10 3v10m0 0l-3-3m3 3l3-3M4 17h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <input type="file" id="import-json-input" accept="application/json" style="display:none" />
        <button class="import-json" title="Import Todos" aria-label="Import Todos">
          <svg viewBox="0 0 20 20" width="20" height="20" fill="none" style="opacity:0.7;"><path d="M10 17V7m0 0l3 3m-3-3L7 10M4 3h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Left Side - Calendar -->
      <div class="calendar-section">
        <div class="calendar"></div>
      </div>
      
      <!-- Right Side - Task List -->
      <div class="task-section">
        <div class="task-header">
          <h2>Tasks for <span class="selected-date"></span></h2>
        </div>
        <div class="task-content">
          <ul class="task-list"></ul>
          <div class="task-input-row">
            <input type="text" class="task-input" placeholder="New Task" />
            <button class="add-task">Add Task</button>
          </div>
        </div>
      </div>
    </div>

    <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:999;display:none;"></canvas>
  </div>
  <script src="script.js"></script>
</body>
</html>
