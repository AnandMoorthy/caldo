<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caldo - Minimalist Todo Calendar</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="app">
    <div class="notification" id="notification" style="display:none"></div>
    
    <!-- Main App (visible by default) -->
    <div class="main-app" id="main-app">
      <!-- Top Header with Import/Export and User Info -->
      <div class="top-header">
        <div class="header-left">
          <button class="nav prev" title="Previous Month">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 5a1 1 0 0 1 .7 1.7L5.9 10H18a1 1 0 1 1 0 2H5.9l3.3 3.3a1 1 0 1 1-1.4 1.4l-5-5a1 1 0 0 1 0-1.4l5-5A1 1 0 0 1 8.5 5z" fill="currentColor"/></svg>
          </button>
          <span class="month-label"></span>
          <button class="nav next" title="Next Month">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 19a1 1 0 0 1-.7-1.7L18.1 14H6a1 1 0 1 1 0-2h12.1l-3.3-3.3a1 1 0 1 1 1.4-1.4l5 5a1 1 0 0 1 0 1.4l-5 5a1 1 0 0 1-.7.3z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="header-right">
          <!-- Auth Section -->
          <div class="auth-section-header" id="auth-section-header">
            <button id="google-signin-btn-header" class="google-signin-btn-header" title="Sign in to sync across devices">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Sign In
            </button>
          </div>
          
          <!-- User Info (hidden until signed in) -->
          <div class="user-info" id="user-info" style="display:none">
            <img id="user-avatar" class="user-avatar" src="" alt="User" />
            <span id="user-name" class="user-name"></span>
            <div class="sync-indicator" id="sync-indicator">
              <span id="sync-text">☁️ Synced</span>
            </div>
            <button id="signout-btn" class="signout-btn" title="Sign Out">Sign Out</button>
          </div>
          
          <button class="export-json" title="Export Todos" aria-label="Export Todos">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="none" style="opacity:0.7;"><path d="M10 3v10m0 0l-3-3m3 3l3-3M4 17h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <input type="file" id="import-json-input" accept="application/json" style="display:none" />
          <button class="import-json" title="Import Todos" aria-label="Import Todos">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="none" style="opacity:0.7;"><path d="M10 17V7m0 0l3 3m-3-3L7 10M4 3h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- Main Content Area -->
      <div class="main-content">
        <!-- Left Side - Calendar -->
        <div class="calendar-section">
          <div class="calendar"></div>
        </div>
        
        <!-- Right Side - Task List -->
        <div class="task-section">
          <div class="task-header">
            <h2>Tasks for <span class="selected-date"></span></h2>
          </div>
          <div class="task-content">
            <ul class="task-list"></ul>
            <div class="task-input-row">
              <input type="text" class="task-input" placeholder="New Task" />
              <button class="add-task">Add Task</button>
            </div>
          </div>
        </div>
      </div>

      <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:999;display:none;"></canvas>
    </div>
  </div>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
